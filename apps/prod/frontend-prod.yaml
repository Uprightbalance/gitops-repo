apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: frontend-prod
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Uprightbalance/gitops-repo.git
    targetRevision: main
    path: k8s/frontend/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
