apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: backend
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Uprightbalance/gitops-repo.git
    targetRevision: HEAD
    path: k8s/backend

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
