apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: dev

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/backend:initial

          ports:
            - containerPort: 8000

          readinessProbe:
            httpGet:
              path: /health
              port: 8000

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
