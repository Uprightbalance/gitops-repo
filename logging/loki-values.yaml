# Loki single-binary configuration
deploymentMode: SingleBinary

singleBinary:
  replicas: 1  # only one main Loki pod

# disable distributed components completely
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
chunks:
  cache:
    replicas: 0
gateway:
  replicas: 1  # keep one gateway for queries

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: s3

    bucketNames:
      chunks: prod-loki-chunks316
      ruler: prod-loki-ruler316
      admin: prod-loki-admin316

    s3:
      region: us-east-1

persistence:
  enabled: false

service:
  type: ClusterIP
  port: 3100

# Disable canary pods
canary:
  enabled: false
