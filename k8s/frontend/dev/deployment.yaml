apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend
          image: 010741811189.dkr.ecr.us-east-1.amazonaws.com/frontend:a7de5d4a8bb896d62e89ec614724399cdc42f8c0

          ports:
            - containerPort: 80
